<!DOCTYPE html>
<html>
<head>
  <title>CV Maker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="form">
    <h2>CV Builder</h2>

 
    <h3>Personal Info</h3>

    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input id="name" placeholder="Full Name">
      </div>

      <div class="form-group">
        <label>Birthday</label>
        <input id="birth" placeholder="Date of Birth">
      </div>

      <div class="form-group">
        <label>Position</label>
        <input id="job" placeholder="Job Title">
      </div>
    </div>


    <h3>Contact</h3>

    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input id="phone-number" placeholder="Phone Number">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input id="email" placeholder="Email">
      </div>
    </div>

    <h3>Education</h3>

    <div class="form-group">
      <label>Degree</label>
      <input id="cv-degree" placeholder="Degree">
    </div>

 
    <h3>Skills</h3>

    <div class="form-group">
      <textarea id="skills" placeholder="e.g. Teamwork, Excel"></textarea>
    </div>

    <h3>Languages</h3>

    <div class="form-group">
      <input id="languages" placeholder="e.g. English B2">
    </div>


    <h3>Experience</h3>

    <div class="form-row">
      <div class="form-group">
        <input id="job-from" placeholder="From">
      </div>

      <div class="form-group">
        <input id="job-to" placeholder="To">
      </div>
    </div>

    <div class="form-group">
      <input id="position" placeholder="Position">
    </div>

    <div class="form-group">
      <input id="position-description" placeholder="Description">
    </div>

    <button onclick="add_job()">Add job</button>

    <h3>Summary</h3>

    <div class="form-group">
      <textarea id="cv-sum" placeholder="About candidate"></textarea>
    </div>

    <button onclick="download_pdf()">Download PDF</button>
  </div>

  <div id="cv">

    <div class="header">
      <h1 id="cv-name">Name</h1>
      <p id="cv-job">Position</p>
    </div>

    <div class="cv-body">

      <div class="left">
        <div class="block">
          <h2>Contact</h2>
          <p id="cv-phone">Phone</p>
          <p id="cv-email">Email</p>
        </div>

        <div class="block">
          <h2>Birthday</h2>
          <p id="birthday">Birthday</p>
        </div>

        <div class="block">
          <h2>Degree</h2>
          <p id="degree-name">University</p>
        </div>

        <div class="block">
          <h2>Skills</h2>
          <p id="cv-skills">Your skills</p>
        </div>

        <div class="block">
          <h2>Languages</h2>
          <p id="cv-languages">Languages</p>
        </div>
      </div>

      <div class="right">
        <div class="block">
          <h2>Experience</h2>
          <div id="jobs"></div>
        </div>

        <div class="block">
          <h2>Summary</h2>
          <p id="cv-summary">About candidate</p>
        </div>
      </div>

    </div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
